name: CI

on:
  push:
    branches: [main, master]
  pull_request:
    branches: [main, master]

jobs:
  build-and-test:
    runs-on: ubuntu-latest
    timeout-minutes: 20

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup pnpm
        uses: pnpm/action-setup@v4
        with:
          version: 9

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: "20"
          cache: "pnpm"

      - name: Install dependencies
        run: pnpm install --frozen-lockfile

      - name: Lint
        run: pnpm lint

      - name: Typecheck
        run: pnpm typecheck

      - name: Prisma generate
        run: pnpm exec prisma generate

      - name: Build
        run: pnpm build
        env:
          DATABASE_URL: postgresql://user:pass@localhost:5432/ci_placeholder?schema=public

      - name: Install Playwright Chromium
        run: pnpm exec playwright install chromium --with-deps

      - name: Playwright tests
        run: pnpm test:e2e
        env:
          CI: true
