<svg width="240" height="80" viewBox="0 0 240 80" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- MUHUB水平LOGO设计 -->
  
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <linearGradient id="textGradient" x1="0%" y1="0%" x2="100%" y2="0%">
      <stop offset="0%" stop-color="#1e40af" />
      <stop offset="50%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <!-- 字体定义 -->
    <style>
      @import url('https://fonts.googleapis.com/css2?family=Inter:wght@700&display=swap');
      .logo-text {
        font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
        font-weight: 700;
        letter-spacing: -0.02em;
      }
    </style>
  </defs>
  
  <!-- LOGO标记 -->
  <g transform="translate(20, 20)">
    <!-- 背景方形 -->
    <rect x="0" y="0" width="40" height="40" rx="8" fill="url(#logoGradient)" />
    
    <!-- M字母 -->
    <path d="M8,8 L8,32 L15,22 L22,32 L29,22 L32,32 L32,8 L29,18 L22,8 L15,18 L8,8 Z" 
          fill="white" 
          stroke="white" 
          stroke-width="1" />
    
    <!-- H字母 -->
    <path d="M10,10 L10,30 L14,30 L14,20 L26,20 L26,30 L30,30 L30,10 L26,10 L26,15 L14,15 L14,10 L10,10 Z" 
          fill="white" 
          stroke="white" 
          stroke-width="1" 
          opacity="0.9" />
  </g>
  
  <!-- 文字部分 -->
  <g transform="translate(70, 20)">
    <!-- MUHUB文字 -->
    <text x="0" y="28" class="logo-text" font-size="32" fill="url(#textGradient)">
      MUHUB
    </text>
    
    <!-- 副标题 -->
    <text x="0" y="52" class="logo-text" font-size="14" fill="#6b7280" font-weight="500">
      木哈布 · AI Native 项目平台
    </text>
  </g>
  
  <!-- 装饰线 -->
  <line x1="70" y1="60" x2="230" y2="60" stroke="#e5e7eb" stroke-width="1" stroke-dasharray="4,4" />
  
  <!-- 科技感装饰元素 -->
  <g opacity="0.3">
    <circle cx="180" cy="20" r="3" fill="#3b82f6">
      <animate attributeName="r" values="3;5;3" dur="2s" repeatCount="indefinite" />
    </circle>
    
    <circle cx="200" cy="20" r="2" fill="#8b5cf6">
      <animate attributeName="r" values="2;4;2" dur="2s" repeatCount="indefinite" begin="0.5s" />
    </circle>
    
    <circle cx="220" cy="20" r="1.5" fill="#7c3aed">
      <animate attributeName="r" values="1.5;3;1.5" dur="2s" repeatCount="indefinite" begin="1s" />
    </circle>
  </g>
</svg>