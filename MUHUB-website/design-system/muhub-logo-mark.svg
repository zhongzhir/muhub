<svg width="120" height="120" viewBox="0 0 120 120" fill="none" xmlns="http://www.w3.org/2000/svg">
  <!-- MUHUB LOGO标记设计 - 极简主义×科技未来感 -->
  
  <defs>
    <!-- 渐变定义 -->
    <linearGradient id="logoGradient" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#2563eb" />
      <stop offset="100%" stop-color="#7c3aed" />
    </linearGradient>
    
    <linearGradient id="logoGradientLight" x1="0%" y1="0%" x2="100%" y2="100%">
      <stop offset="0%" stop-color="#3b82f6" />
      <stop offset="100%" stop-color="#8b5cf6" />
    </linearGradient>
    
    <!-- 阴影效果 -->
    <filter id="logoShadow" x="-20%" y="-20%" width="140%" height="140%">
      <feGaussianBlur in="SourceAlpha" stdDeviation="3" />
      <feOffset dx="0" dy="4" result="offsetblur" />
      <feComponentTransfer>
        <feFuncA type="linear" slope="0.2" />
      </feComponentTransfer>
      <feMerge>
        <feMergeNode />
        <feMergeNode in="SourceGraphic" />
      </feMerge>
    </filter>
  </defs>
  
  <!-- 背景圆形 -->
  <circle cx="60" cy="60" r="56" fill="url(#logoGradient)" filter="url(#logoShadow)" />
  
  <!-- M字母设计 - 现代几何风格 -->
  <path d="M40,40 L40,80 L50,65 L60,80 L70,65 L80,80 L80,40 L70,55 L60,40 L50,55 L40,40 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="2" />
  
  <!-- H字母设计 - 与M形成对称 -->
  <path d="M45,45 L45,75 L55,75 L55,60 L65,60 L65,75 L75,75 L75,45 L65,45 L65,55 L55,55 L55,45 L45,45 Z" 
        fill="white" 
        stroke="white" 
        stroke-width="2" 
        opacity="0.9" />
  
  <!-- 装饰性科技元素 -->
  <circle cx="60" cy="60" r="20" fill="none" stroke="white" stroke-width="1" stroke-dasharray="2,2" opacity="0.3" />
  
  <!-- 光点效果 -->
  <circle cx="45" cy="45" r="2" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" />
  </circle>
  
  <circle cx="75" cy="45" r="2" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="0.5s" />
  </circle>
  
  <circle cx="45" cy="75" r="2" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="1s" />
  </circle>
  
  <circle cx="75" cy="75" r="2" fill="white" opacity="0.8">
    <animate attributeName="opacity" values="0.8;0.2;0.8" dur="2s" repeatCount="indefinite" begin="1.5s" />
  </circle>
</svg>